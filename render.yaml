services:
  - type: web
    name: zoe-personal-assistant
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn zoe_assistant.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: TIMEZONE
        value: Asia/Jerusalem
      - key: TOKEN_STORE
        value: file
      - key: SECRET_KEY
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: PRIMARY_WHATSAPP_TO
        sync: false
